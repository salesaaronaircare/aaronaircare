<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Aaron Air Care Engineering</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #071120; --accent: #00C2FF; --navy: #0A192F; }
        body { margin: 0; padding: 0; font-family: 'Poppins', sans-serif; background: var(--bg); color: white; overflow: hidden; }
        .error-section { height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; background: radial-gradient(circle at center, #0A192F 0%, #071120 100%); }
        .error-glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); padding: 60px 40px; border-radius: 24px; box-shadow: 0 40px 100px rgba(0,0,0,0.5); max-width: 500px; width: 90%; }
        .logo-404 { width: 80px; height: 80px; margin-bottom: 30px; filter: drop-shadow(0 0 15px rgba(0, 194, 255, 0.4)); }
        h1 { font-family: 'Montserrat', sans-serif; font-size: 6rem; margin: 0; color: var(--accent); line-height: 1; text-shadow: 0 10px 30px rgba(0, 194, 255, 0.3); }
        h2 { font-size: 1.5rem; margin: 20px 0 10px; font-weight: 600; }
        p { opacity: 0.7; margin-bottom: 35px; line-height: 1.6; font-size: 0.95rem; }
        .btn-home { background: var(--accent); color: #000; padding: 16px 32px; border-radius: 12px; font-weight: 700; text-decoration: none; display: inline-block; transition: 0.3s; box-shadow: 0 10px 25px rgba(0, 194, 255, 0.3); }
        .btn-home:hover { transform: translateY(-5px); box-shadow: 0 15px 35px rgba(0, 194, 255, 0.5); }
    </style>
</head>
<body>
    <section class="error-section">
        <div class="error-glass">
            <img src="logo.png" alt="Aaron Air Care" class="logo-404">
            <h1>404</h1>
            <h2>Project Not Found</h2>
            <p>The engineering specifications or page you requested are unavailable. Let's get you back to the main site.</p>
            <a href="index.html" class="btn-home">Back to Homepage</a>
        </div>
    </section>
</body>
</html>
