<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Aaron Air Care Engineering</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .error-section {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: var(--navy);
            color: white;
            padding: 20px;
        }
        .error-content h1 {
            font-size: 8rem;
            margin: 0;
            color: var(--blue-accent);
            line-height: 1;
        }
        .error-content h2 {
            font-size: 2rem;
            margin: 20px 0;
        }
        .error-content p {
            margin-bottom: 30px;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <section class="error-section">
        <div class="error-content">
            <h1>404</h1>
            <h2>Oops! Page Not Found</h2>
            <p>The page you are looking for might have been removed or is temporarily unavailable.</p>
            <a href="index.html" class="btn-primary">Return to Homepage</a>
        </div>
    </section>
</body>
</html>
