<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Quote Request Received | Aaron Air Care Engineering</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Poppins:wght@400;600;700&display=swap"
        rel="stylesheet">

    <!-- Global CSS Variables -->
    <style>
        :root {
            --bg: #071120;
            --navy: #0A192F;
            --accent: #00C2FF;
            --text-primary: #F5F7FA;
            --glass: rgba(255, 255, 255, 0.03);
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            background: radial-gradient(circle at center, #0A192F 0%, #071120 100%);
        }

        .thank-you-container {
            width: 90%;
            max-width: 600px;
            padding: 50px 30px;
            background: var(--glass);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .success-icon {
            width: 80px;
            height: 80px;
            background: rgba(0, 194, 255, 0.1);
            color: var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin: 0 auto 30px;
            border: 2px solid var(--accent);
            box-shadow: 0 0 30px rgba(0, 194, 255, 0.3);
        }

        h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 2rem;
            margin-bottom: 15px;
            color: var(--accent);
            line-height: 1.2;
        }

        p {
            font-size: 1.1rem;
            opacity: 0.8;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .cta-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .btn {
            padding: 16px;
            border-radius: 12px;
            font-weight: 700;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: var(--transition);
            font-size: 0.95rem;
        }

        .btn-whatsapp {
            background: #25D366;
            color: white;
        }

        .btn-call {
            background: rgba(255, 255, 255, 0.05);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-home {
            grid-column: span 2;
            background: var(--accent);
            color: #000;
            margin-top: 5px;
            box-shadow: 0 10px 30px rgba(0, 194, 255, 0.3);
        }

        .btn:hover {
            transform: translateY(-5px);
            filter: brightness(1.1);
        }

        .footer-note {
            font-size: 0.8rem;
            opacity: 0.5;
            margin-top: 30px;
        }

        /* Mobile Adjustments */
        @media (max-width: 480px) {
            .cta-grid {
                grid-template-columns: 1fr;
            }

            .btn-home {
                grid-column: span 1;
            }

            h1 {
                font-size: 1.6rem;
            }

            .thank-you-container {
                padding: 40px 20px;
            }
        }

        /* Conversion Tracking Hook */
        .tracking-pixel {
            position: absolute;
            visibility: hidden;
            pointer-events: none;
        }
    </style>

    <!-- Global site tag (gtag.js) - Google Ads -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=AW-CONVERSION_ID_HERE"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'AW-CONVERSION_ID_HERE');

        // Event snippet for Quote Request conversion page
        gtag('event', 'conversion', {
            'send_to': 'AW-CONVERSION_ID_HERE/LABEL_HERE',
            'value': 1.0,
            'currency': 'INR'
        });
    </script>
</head>

</html>
